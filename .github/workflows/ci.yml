name: Monorepo CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.17.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint and Build (affected on PR)
        if: github.event_name == 'pull_request'
        run: |
          pnpm turbo run lint build test --affected

      - name: Lint and Build (full on main push)
        if: github.event_name == 'push'
        run: |
          pnpm turbo run lint build test
